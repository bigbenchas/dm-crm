<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Benchas — CRM</title>
<style>
  :root{
    --bg:#090C12;--bg2:#0E1219;--panel:#141925;--panel2:#1A2030;--card:#161C28;--card-hover:#1C2435;
    --border:#242C3B;--border-soft:#1E2533;--text:#EAEEF6;--muted:#8B95A8;--muted2:#5E6677;
    --accent:#4F8DFD;--accent2:#2DD4BF;
    --new:#7A8699;--convo:#4F8DFD;--script:#A874FF;--closer:#F5A524;--booked:#22C55E;--won:#EAB308;
    --hot:#22C55E;--warm:#4F8DFD;--cool:#F5A524;--cold:#7A8699;
    --shadow:0 10px 30px -12px rgba(0,0,0,.7);
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden;
    background:radial-gradient(1200px 600px at 12% -10%,rgba(79,141,253,.10),transparent 60%),
               radial-gradient(1000px 500px at 100% 0%,rgba(45,212,191,.06),transparent 55%),var(--bg);}
  ::-webkit-scrollbar{width:8px;height:9px}::-webkit-scrollbar-thumb{background:#222a39;border-radius:10px}

  .shell{display:flex;height:100vh}

  /* sidebar */
  .side{width:230px;min-width:230px;border-right:1px solid var(--border-soft);display:flex;flex-direction:column;
    background:linear-gradient(180deg,rgba(20,25,37,.55),rgba(9,12,18,.4))}
  .brand{display:flex;align-items:center;gap:11px;padding:18px 18px 16px}
  .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:grid;place-items:center;font-weight:800;color:#06121f;font-size:15px;box-shadow:0 6px 16px -6px rgba(79,141,253,.6)}
  .brand h1{font-size:15px;font-weight:800;letter-spacing:.2px}.brand .sub{font-size:10.5px;color:var(--muted)}
  .nav{padding:6px 12px;display:flex;flex-direction:column;gap:3px;flex:1}
  .nav .lbl{font-size:10px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.8px;padding:14px 10px 6px}
  .navitem{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:10px;cursor:pointer;color:var(--muted);font-size:13.5px;font-weight:600;transition:.13s}
  .navitem:hover{background:var(--panel);color:var(--text)}
  .navitem.active{background:var(--panel2);color:#fff}
  .navitem.active .ic{filter:drop-shadow(0 0 6px rgba(79,141,253,.5))}
  .navitem .ic{width:18px;text-align:center;font-size:15px}
  .navitem .badge{margin-left:auto;font-size:10px;font-weight:700;background:var(--accent);color:#fff;padding:1px 7px;border-radius:20px}
  .side-foot{padding:12px;border-top:1px solid var(--border-soft);display:flex;align-items:center;gap:10px}
  .avatar-me{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#22C55E,#16a34a);display:grid;place-items:center;font-weight:700;font-size:13px;color:#04210f}
  .side-foot .nm{font-size:13px;font-weight:700}.side-foot .rl{font-size:10.5px;color:var(--muted)}

  /* main */
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{display:flex;align-items:center;gap:16px;padding:14px 24px;border-bottom:1px solid var(--border-soft);
    background:linear-gradient(180deg,rgba(20,25,37,.5),transparent)}
  .topbar h2{font-size:18px;font-weight:800;letter-spacing:-.2px}
  .topbar .tsub{font-size:12px;color:var(--muted);margin-top:1px}
  .search{flex:1;max-width:360px;display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:9px 13px;color:var(--muted)}
  .search input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:100%;font-family:var(--font)}
  .search input::placeholder{color:var(--muted2)}
  .spacer{flex:1}
  .livechip{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#9be8c0;background:rgba(34,197,94,.10);border:1px solid rgba(34,197,94,.25);padding:6px 11px;border-radius:20px}
  .dot{width:7px;height:7px;border-radius:50%;background:#22C55E;animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 7px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  .proto-badge{font-size:10px;font-weight:700;color:#f7c065;background:rgba(245,165,36,.12);border:1px solid rgba(245,165,36,.3);padding:5px 10px;border-radius:20px}
  .view{flex:1;overflow:auto;padding:22px 24px}

  .btn{display:inline-flex;align-items:center;gap:7px;font-family:var(--font);font-size:13px;font-weight:600;color:var(--text);cursor:pointer;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:9px 14px;transition:.15s}
  .btn:hover{background:var(--panel2);border-color:#33405a}
  .btn.primary{background:linear-gradient(135deg,var(--accent),#3b7bf0);border-color:transparent;color:#fff}
  .btn.sm{padding:6px 11px;font-size:12px}

  /* score ring + pill */
  .ring{position:relative;border-radius:50%;display:grid;place-items:center;flex-shrink:0}
  .ring .inner{background:var(--bg);border-radius:50%;display:grid;place-items:center;flex-direction:column;text-align:center}
  .ring .sc{font-weight:800;line-height:1}
  .scpill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:3px 9px 3px 6px;border-radius:20px}
  .scpill .d{width:7px;height:7px;border-radius:50%}

  /* cards/grid */
  .grid{display:grid;gap:14px}
  .panel-card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--border-soft);border-radius:16px;padding:16px}
  .panel-card h3{font-size:13px;font-weight:700}.panel-card .ph{display:flex;align-items:center;gap:8px;margin-bottom:13px}
  .kpi .label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .kpi .val{font-size:26px;font-weight:800;margin-top:6px;letter-spacing:-.6px}
  .kpi .delta{font-size:11px;font-weight:600;margin-top:3px}
  .up{color:#4ade80}.down{color:#f87171}.flat{color:var(--muted)}

  /* lists */
  .lead-line{display:flex;align-items:center;gap:11px;padding:9px;border-radius:11px;cursor:pointer;transition:.12s}
  .lead-line:hover{background:var(--panel2)}
  .ava{border-radius:11px;display:grid;place-items:center;font-weight:700;color:#fff;flex-shrink:0;position:relative}
  .plat{position:absolute;bottom:-3px;right:-3px;width:15px;height:15px;border-radius:5px;display:grid;place-items:center;font-size:8px;font-weight:800;color:#fff;border:2px solid var(--bg)}
  .ig{background:linear-gradient(135deg,#feda75,#d62976,#962fbf)}.fb{background:#1877F2}
  .stage-chip{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}

  /* insight rows */
  .insight{display:flex;gap:11px;padding:11px;border-radius:12px;background:var(--card);border:1px solid var(--border);margin-bottom:9px}
  .insight .ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-size:15px;flex-shrink:0}
  .insight .it{font-size:12.5px;font-weight:700}.insight .id{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.45}

  /* table */
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--border-soft);cursor:pointer;user-select:none}
  th:hover{color:var(--text)}
  td{padding:11px 12px;border-bottom:1px solid var(--border-soft);font-size:13px}
  tr.lrow{cursor:pointer;transition:.12s}tr.lrow:hover td{background:var(--panel)}
  .bar{height:6px;border-radius:6px;background:var(--panel2);overflow:hidden;width:90px}
  .bar i{display:block;height:100%;border-radius:6px}

  /* kanban */
  .board{display:flex;gap:14px;height:100%;overflow-x:auto;padding-bottom:6px}
  .col{width:280px;min-width:280px;display:flex;flex-direction:column;background:linear-gradient(180deg,rgba(20,25,37,.5),rgba(14,18,25,.35));border:1px solid var(--border-soft);border-radius:16px;max-height:100%}
  .col-head{padding:13px 14px 11px;position:relative}
  .col-head::before{content:"";position:absolute;top:0;left:14px;right:14px;height:3px;border-radius:0 0 4px 4px;background:var(--c)}
  .col-title{display:flex;align-items:center;gap:9px}.col-title .cdot{width:9px;height:9px;border-radius:50%;background:var(--c)}
  .col-title h3{font-size:13px;font-weight:700}.count{margin-left:auto;font-size:11px;font-weight:700;color:var(--muted);background:var(--panel2);border:1px solid var(--border);padding:2px 9px;border-radius:20px}
  .cards{padding:11px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;flex:1}
  .col.dragover{outline:2px dashed var(--c);outline-offset:-4px}
  .kcard{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:12px;cursor:grab;transition:.14s;position:relative}
  .kcard:hover{background:var(--card-hover);border-color:#33405a;transform:translateY(-2px);box-shadow:var(--shadow)}
  .kcard.dragging{opacity:.5}
  .kcard .top{display:flex;align-items:center;gap:10px}
  .kcard .nm{font-size:13px;font-weight:700}.kcard .hd{font-size:10.5px;color:var(--muted);margin-top:1px}
  .kcard .snip{font-size:11.5px;color:var(--muted);margin-top:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.45}
  .kcard .foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:9px;border-top:1px solid var(--border-soft);font-size:10px;color:var(--muted2)}
  .more{text-align:center;font-size:11px;color:var(--muted);padding:9px;border:1px dashed var(--border);border-radius:11px;font-weight:600}

  /* inbox */
  .inbox{display:flex;height:100%}
  .ilist{width:300px;min-width:300px;border-right:1px solid var(--border-soft);display:flex;flex-direction:column}
  .itabs{display:flex;gap:6px;padding:0 4px 10px;flex-wrap:wrap}
  .itab{font-size:11.5px;font-weight:600;color:var(--muted);background:var(--panel);border:1px solid var(--border);padding:5px 10px;border-radius:20px;cursor:pointer}
  .itab.active{background:var(--accent);border-color:transparent;color:#fff}
  .iconvos{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:2px}
  .crow{display:flex;gap:10px;padding:10px;border-radius:12px;cursor:pointer;transition:.12s}
  .crow:hover{background:var(--panel)}.crow.active{background:var(--panel2);box-shadow:inset 3px 0 0 var(--accent)}
  .crow .nm{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .crow .tm{font-size:10px;color:var(--muted2);margin-left:auto}
  .crow .snip{font-size:11.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .unread{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px rgba(79,141,253,.8)}
  .btn.xs{padding:4px 9px;font-size:11px;border-radius:8px}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .ibar{display:flex;align-items:center;gap:8px;padding:2px 6px 8px;font-size:11.5px;color:var(--muted)}
  .ibar-chk{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
  .crow-chk{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;align-self:center}
  .urdot{width:12px;height:12px;border-radius:50%;border:none;cursor:pointer;padding:0;background:var(--accent);box-shadow:0 0 8px rgba(79,141,253,.8)}
  .urdot.read{background:transparent;border:1.5px solid var(--muted2);box-shadow:none}
  .thread{flex:1;display:flex;flex-direction:column;min-width:0}
  .t-head{display:flex;align-items:center;gap:12px;padding:6px 6px 14px;border-bottom:1px solid var(--border-soft)}
  .msgs{flex:1;overflow-y:auto;padding:18px 6px;display:flex;flex-direction:column;gap:11px}
  .m{max-width:78%;display:flex;flex-direction:column;gap:3px}.m.them{align-self:flex-start}.m.us{align-self:flex-end;align-items:flex-end}
  .bub{padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .them .bub{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
  .us .bub{background:linear-gradient(135deg,#3b7bf0,#4F8DFD);color:#fff;border-bottom-right-radius:4px}
  .us .bub a{color:#fff}
  .who{font-size:9px;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:0 6px}
  .mtime{font-size:9.5px;color:var(--muted2);padding:0 6px}
  .ai-tag{font-size:8.5px;font-weight:700;color:#8fb6fd;background:rgba(79,141,253,.15);padding:1px 5px;border-radius:5px;margin-left:5px}
  .composer{border-top:1px solid var(--border-soft);padding:12px 6px 4px}
  .sugg{display:flex;gap:7px;margin-bottom:9px;flex-wrap:wrap}
  .sugg .lbl{font-size:10px;font-weight:700;color:#8fb6fd;align-self:center}
  .schip{font-size:11.5px;font-weight:500;color:var(--text);background:rgba(79,141,253,.10);border:1px solid rgba(79,141,253,.28);padding:6px 11px;border-radius:18px;cursor:pointer;transition:.13s;max-width:340px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .schip:hover{background:rgba(79,141,253,.2)}
  .cbox{display:flex;align-items:flex-end;gap:10px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:7px 7px 7px 13px}
  .cbox textarea{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:var(--font);resize:none;max-height:110px;line-height:1.5;padding:6px 0}
  .send{width:36px;height:36px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--accent),#3b7bf0);color:#fff;font-size:15px;flex-shrink:0}
  .ictx{width:280px;min-width:280px;border-left:1px solid var(--border-soft);overflow-y:auto;padding-left:16px}
  .sec{padding:14px 0;border-bottom:1px solid var(--border-soft)}
  .sec h4{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:10px;font-weight:700}
  .kv{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0}.kv .k{color:var(--muted)}.kv .v{font-weight:600}
  .answer{display:flex;gap:9px;font-size:12.5px;padding:7px 0}
  .answer .ck{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:900;flex-shrink:0;margin-top:1px}
  .answer .ck.ok{background:rgba(34,197,94,.15);color:#4ade80}.answer .ck.no{background:var(--panel2);color:var(--muted2)}
  .answer .q{color:var(--muted);font-size:11px}.answer .a{font-weight:600;margin-top:1px}
  .coach{background:linear-gradient(135deg,rgba(79,141,253,.12),rgba(45,212,191,.06));border:1px solid rgba(79,141,253,.25);border-radius:12px;padding:12px;font-size:12.5px;line-height:1.5}
  .coach .h{font-size:10px;font-weight:700;color:#8fb6fd;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .factor{margin:9px 0}.factor .fr{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:4px}.factor .fr .fp{color:var(--muted);font-weight:600}
  .ctag{font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;background:var(--panel2);border:1px solid var(--border);color:var(--muted)}

  /* funnel */
  .funnel{display:flex;flex-direction:column;gap:8px}
  .frow{display:flex;align-items:center;gap:12px}
  .frow .fl{width:120px;font-size:12px;color:var(--muted);font-weight:600}
  .ftrack{flex:1;height:34px;border-radius:9px;background:var(--panel2);overflow:hidden;position:relative}
  .ftrack i{display:block;height:100%;border-radius:9px;background:linear-gradient(90deg,var(--accent),var(--accent2));display:flex;align-items:center;padding-left:12px;font-size:12px;font-weight:800;color:#06121f}
  .fpct{width:54px;text-align:right;font-size:12px;color:var(--muted);font-weight:700}

  .toasts{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:9px;align-items:center}
  .toast{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;background:linear-gradient(135deg,#13351f,#0f2a1a);border:1px solid rgba(34,197,94,.35);color:#bdf0d0;padding:11px 16px;border-radius:12px;box-shadow:var(--shadow);animation:pop .3s ease, fade .3s ease 2.4s forwards}
  .toast.err{background:linear-gradient(135deg,#3a1417,#2a0f12);border-color:rgba(248,113,113,.4);color:#f6c6cb}
  .toast .tdot{width:18px;height:18px;border-radius:50%;background:#22C55E;display:grid;place-items:center;color:#04210f;font-size:11px;font-weight:900}
  @keyframes pop{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes fade{to{opacity:0;transform:translateY(8px)}}
  .muted{color:var(--muted)}
  .switch{position:relative;width:38px;height:22px;border-radius:20px;background:var(--panel2);border:1px solid var(--border);cursor:pointer;transition:.15s}
  .switch.on{background:var(--accent);border-color:transparent}
  .switch i{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.15s}
  .switch.on i{left:18px}
  .inp{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:8px 11px;color:var(--text);font-size:12.5px;font-family:var(--font);width:100%;outline:none}
  .kmore{border:1px solid var(--border);background:var(--panel);color:var(--muted);font-size:13px;line-height:1;border-radius:7px;cursor:pointer;padding:3px 9px;font-weight:700;transition:.12s}
  .kmore:hover{background:var(--panel2);color:var(--text);border-color:#33405a}
  /* lead action menu (pipeline click) */
  .lm-back{position:fixed;inset:0;z-index:120;background:rgba(5,8,13,.62);backdrop-filter:blur(3px);display:grid;place-items:center;padding:20px}
  .lm-card{width:430px;max-width:94vw;background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:var(--shadow);animation:pop .18s ease}
  .lm-x{margin-left:auto;background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:4px 6px;border-radius:8px}
  .lm-x:hover{background:var(--panel2);color:var(--text)}
  .lm-stages{display:flex;flex-wrap:wrap;gap:7px}
  .lm-stage{font-size:12px;font-weight:600;color:var(--text);background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:7px 11px;cursor:pointer;transition:.12s;font-family:var(--font)}
  .lm-stage:hover{background:var(--accent);border-color:transparent;color:#fff}
  .lm-stage.cur{background:var(--panel2);color:var(--muted2);cursor:default;border-style:dashed}
  @media(max-width:1150px){.ictx{display:none}}
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="brand"><div class="logo">BB</div><div><h1>Big Benchas</h1><div class="sub">Sales CRM</div></div></div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot"><div class="avatar-me">CB</div><div><div class="nm">Coach Ben</div><div class="rl">Owner</div></div></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div><h2 id="ptitle">Dashboard</h2><div class="tsub" id="psub"></div></div>
      <div class="search"><span>🔍</span><input id="gsearch" placeholder="Search leads, tags, messages…"></div>
      <div class="spacer"></div>
      <div id="livewrap"></div>
    </div>
    <div class="view" id="view"></div>
  </div>
</div>
<div class="toasts" id="toasts"></div>

<script>
/* =========================================================================
   Big Benchas CRM — live front-end.
   HighLevel is the single source of truth. The browser talks ONLY to the
   Supabase edge function (which holds the HL token). If the backend is
   unreachable, the app falls back to demo data so it always renders.
   ========================================================================= */

const CONFIG = {
  fnUrl:       "https://kujrcdkswpjrjmnmciai.functions.supabase.co/hl",
  supabaseUrl: "https://kujrcdkswpjrjmnmciai.supabase.co",
  anonKey:     "sb_publishable_LO0Znh4ZhwOMzAO8rjAhZw_BieIrkjF",
  refreshMs:   45000,
};

/* The "DM's" pipeline stages (from ?action=pipelines). Refreshed live on boot. */

function stageColorByIndex(i){return STAGE_PALETTE[i%STAGE_PALETTE.length]}
function stageById(id){return STAGES.find(s=>s.id===id)}
function stageGroup(name){
  const s=(name||'').toLowerCase();
  if(s.includes('current athlete')||s.includes('coaching athlete')||s.includes('membership')) return 'won';
  if(s.includes('call booked')||s.includes('booked')) return 'booked';
  if(s.includes('downsell')) return 'closer';
  if(s.includes('script')) return 'script';
  if(s.includes('contacted')||s.includes('warm')||s==='') return 'convo';
  return 'nurture';
}

const AVA=['#4F8DFD','#A874FF','#F5A524','#22C55E','#EC4899','#14B8A6','#F97316','#6366F1','#EAB308','#06B6D4'];
const avaColor=n=>{let s=0;for(const c of (n||'?'))s+=c.charCodeAt(0);return AVA[s%AVA.length]};
const initials=n=>(n||'?').split(' ').filter(Boolean).slice(0,2).map(x=>x[0].toUpperCase()).join('')||'?';
const STAGEBG_score=s=>({hot:'rgba(34,197,94,.13)',warm:'rgba(79,141,253,.13)',cool:'rgba(245,165,36,.13)',cold:'rgba(122,134,153,.13)'})[sc(s)];
function sc(score){return score>=80?'hot':score>=58?'warm':score>=38?'cool':'cold'}
function scColor(score){return `var(--${sc(score)})`}
function scLabel(score){return {hot:'Hot',warm:'Warm',cool:'Cool',cold:'Cold'}[sc(score)]}
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

let LEADS=[], LIVE=false, syncedAt=null, loadError=null, authFailed=false, everLoaded=false;

/* every request carries the shared passcode */
function authHeaders(extra){ return Object.assign({'x-app-key':APP_KEY}, extra||{}); }
function authGet(path){ return fetch(`${CONFIG.fnUrl}${path}`, {headers:authHeaders()}); }
const post = (body)=>fetch(CONFIG.fnUrl,{method:'POST',headers:authHeaders({'Content-Type':'application/json'}),body:JSON.stringify(body)}).then(r=>r.json());

function normalizeLead(l,i){
  l.id = l.contactId || l.id || ('demo'+i);
  l.name = l.name || 'Unknown';
  l.plat = l.plat || 'ig';
  l.score = l.score ?? 0;
  l.tier = l.tier || scLabel(l.score);
  l.tags = l.tags || [];
  l.loc = l.loc || '—';
  l.yrs = l.yrs || '—';
  l.time = l.time || '—';
  l.ans = l.ans || {age:null,loc:l.loc,blocker:null,goal:null};
  l.lastMessage = l.lastMessage || (l.msgs && l.msgs.length ? l.msgs[l.msgs.length-1].t : '');
  l.stageName = l.stageName || (l.stageId ? (stageById(l.stageId)?.name||'') : '');
  l.group = l.group || (l.booked ? (l.won?'won':'booked') : stageGroup(l.stageName));
  l.inPipeline = (l.inPipeline ?? !!l.opportunityId);   // in the DM's pipeline (Pipeline/Leads/stats)
  l.hasConv = (l.hasConv ?? !!(l.lastMessage || l.lastDir));  // has a HL conversation (Inbox)
  l.coach = l.coach || '';
  // factors -> tuples [label,pts,max] (backend sends objects)
  l.factors = (l.factors||[]).map(f=>Array.isArray(f)?f:[f.label,f.pts,f.max]);
  return l;
}

async function loadLeads(){
  try{
    const r = await authGet(`?action=list`);
    if(r.status===401){ authFailed=true; throw new Error('unauthorized'); }
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();
    if(j.error) throw new Error(j.error);
    const fresh = (j.leads||[]).map(normalizeLead);
    // Only replace what's on screen if the refresh actually returned leads (or it's
    // the very first load). A transient empty/slow response from HighLevel must NOT
    // blank an already-populated board.
    if(fresh.length || !everLoaded) LEADS = fresh;
    if(fresh.length) everLoaded = true;
    LIVE=true; loadError=null; authFailed=false; syncedAt=j.syncedAt;
  }catch(e){
    loadError=String(e.message||e);
    if(authFailed){ LEADS=[]; return; }            // bad passcode → clear & re-login
    if(!everLoaded){ LIVE=false; LEADS=[]; }        // initial failure → honest empty state
    // otherwise: transient refresh hiccup → keep the leads already on screen, no flicker
  }
  if(!activeId && LEADS.length) activeId=LEADS[0].id;
}

async function refreshStages(){
  try{
    const r=await authGet(`?action=pipelines`);
    if(!r.ok) return;
    const j=await r.json();
    const p=(j.pipelines||[]).find(x=>x.id===j.resolvedPipelineId);
    if(p&&p.stages&&p.stages.length) STAGES=p.stages.map(s=>({id:s.id,name:s.name}));
  }catch(e){/* keep baked stages */}
}

function stLabel(g){return {new:'New DM',convo:'In Convo',script:'Script',closer:'Closer',booked:'Booked',won:'Client',nurture:'Follow-up'}[g]||g}
// Current clients (Current Athlete / won) are NOT active leads — exclude them from stats, scoring views, dashboard and the leads list (they still appear in the Pipeline mirror + the Clients KPI).
function isClient(l){ return !!(l && (l.won || l.group==='won' || /current athlete/i.test(l.stageName||''))); }
// Active prospect = in the DM's pipeline and not yet a client. Drives all lead stats/scoring views.
function isProspect(l){ return !!(l && l.inPipeline && !isClient(l)); }
function emptyRow(){return `<div class="muted" style="padding:14px;font-size:12.5px">No leads loaded.</div>`}
function dashInsights(){
  const P=LEADS.filter(isProspect);
  const needs=P.filter(l=>l.needs).length;
  const hot=[...P].sort((a,b)=>b.score-a.score)[0];
  const booked=P.filter(l=>l.group==='booked'||l.booked).length;
  const cold=P.filter(l=>l.score<38).length;
  const rows=[];
  if(needs) rows.push(['rgba(245,165,36,.15)','⚠️',`${needs} leads need a reply`,`These DMs have an inbound message waiting on you — answer the warm ones first.`]);
  if(hot) rows.push(['rgba(34,197,94,.15)','✅',`Hottest: ${esc(hot.name)} (${hot.score})`,esc(hot.coach||'Top of your list — push them today.')]);
  if(booked) rows.push(['rgba(79,141,253,.15)','📅',`${booked} calls booked`,`Confirm each one and prep a plan so they show up.`]);
  if(cold && rows.length<3) rows.push(['rgba(248,113,113,.15)','📉',`${cold} cold leads`,`Low intent right now — a re-engage nudge could recover some.`]);
  return rows.slice(0,3).map(r=>`<div class="insight"><div class="ic" style="background:${r[0]}">${r[1]}</div><div><div class="it">${r[2]}</div><div class="id">${r[3]}</div></div></div>`).join('')||emptyRow();

function iFiltered(){const q=gq();return LEADS.filter(l=>{
  if(!l.hasConv)return false;   // Inbox mirrors HighLevel conversations (everyone with DM activity)
  if(iTab==='unread'&&!unreadEff(l))return false;if(iTab==='needs'&&!l.needs)return false;if(iTab==='booked'&&!(l.group==='booked'||l.booked))return false;

// --- read state (persists in the browser so read items don't pop back on refresh; a NEW
//     message (higher lastMs than when marked read) makes it unread again) + HL best-effort sync ---
let READ={}; try{ READ=JSON.parse(localStorage.getItem('bb_read')||'{}'); }catch(e){ READ={}; }
function saveRead(){ try{ localStorage.setItem('bb_read',JSON.stringify(READ)); }catch(e){} }
function unreadEff(l){ return !!(l && l.unread && !(READ[l.id]!=null && READ[l.id]>=(l.lastMs||0))); }
function markRead(ids, read){
  ids.forEach(id=>{ const l=LEADS.find(x=>x.id===id); if(!l)return;
    if(read){ READ[id]=l.lastMs||Date.now(); if(LIVE&&l.contactId) post({action:'read',contactId:l.contactId}).catch(()=>{}); }
    else { delete READ[id]; }
  });
  saveRead();
}

async function openConvo(id){
  activeId=id;const l=LEADS.find(x=>x.id===id);if(!l)return;
  renderNav();renderIList();renderThread(l);renderICtx(l);   // opening does NOT mark read — Ben marks read explicitly
  if(LIVE) fetchSuggestions(l);   // Jake drafts a reply from the playbook + live thread
  if(LIVE && !l.msgs){
    try{
      const r=await authGet(`?action=messages&contactId=${encodeURIComponent(l.contactId)}`);
      const j=await r.json();
      l.msgs=(j.messages||[]).map(m=>({who:m.who,t:m.t,time:fmtTime(m.time),ai:0}));
    }catch(e){ l.msgs=[]; }
    if(id===activeId) renderThread(l);
  }
}
function fmtTime(t){ if(!t)return''; try{const d=new Date(t);if(isNaN(d))return String(t);return d.toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}catch(e){return String(t)} }
function suggestions(l){
  if(l.sug&&l.sug.length) return l.sug;
  const last=(l.lastMessage||'').toLowerCase();
  if(l.group==='booked'||l.booked) return ["Confirm your time and ask them to send a recent lift video so I can prep.","See you then! Anything you want me to look at before the call?"];
  if(/price|cost|invest|how much/.test(last)) return ["Great question — easiest to walk you through it on a quick call. Here's my calendar: http://tinyurl.com/strategy-call-coachben","Happy to break it down live so it fits your goals — want to grab a time?"];
  if(l.needs) return ["Love that — how long have you been competing, and what's your #1 goal right now?","Solid. What's the biggest thing holding your total back at the moment?"];
  return ["Appreciate you reaching out 💪 what are you training toward right now?","Good question — quick fix incoming. Are you prepping for a meet or building a base?"];
}
function renderThread(l){
  const th=document.getElementById('thread');if(!th)return;
  let msgsHtml;
  if(LIVE && l.msgs===undefined) msgsHtml=`<div class="muted" style="margin:auto">Loading conversation…</div>`;
  else{
    const msgs=(l.msgs||[]);
    msgsHtml = msgs.length ? msgs.map(m=>{const who=m.who==='us'?`Coach Ben${m.ai?'<span class="ai-tag">AI</span>':''}`:esc(l.name.split(' ')[0]);
      const t=esc(m.t).replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>');
      return `<div class="m ${m.who}"><div class="who">${who}</div><div class="bub">${t}</div><div class="mtime">${esc(m.time||'')}</div></div>`}).join('')
      : `<div class="muted" style="margin:auto;font-size:12.5px">${l.lastMessage?('Last: '+esc(l.lastMessage)):'No message history available.'}</div>`;
  }

// Render Jake's suggested replies (drafted server-side from the playbook + live thread).
function renderSugBar(l){
  const bar=document.getElementById('sugbar'); if(!bar||activeId!==l.id) return;
  const j=l._jake;
  if(j===undefined){ bar.innerHTML=`<span class="lbl">✨ Jake is drafting…</span>`; return; }
  if(j&&j.needsKey){ bar.innerHTML=`<span class="lbl" style="color:#f7c065">Jake needs an Anthropic key (Settings → add ANTHROPIC_API_KEY)</span>`; return; }
  if(j&&j.mode==='personal'){ bar.innerHTML=`<span class="lbl" style="color:#f87171">⚠ Looks personal — ${esc(j.note||'handle this one yourself')}</span>`; return; }
  const sugs=(j&&j.suggestions)||[];

  const chips = sugs.map((s,i)=>`<div class="schip" onclick="useSug(${i})" title="${esc(s).replace(/"/g,'&quot;')}">✨ ${esc(s)}</div>`).join('');
  bar.innerHTML = note + `<span class="lbl">Jake suggests:</span>` + (chips || `<span class="muted" style="font-size:11.5px">No draft — write your own.</span>`)
    + (j&&j.mode==='transition'?`<button class="schip" style="color:#9be8c0;border-color:rgba(34,197,94,.35)" onclick="quickTag()">🎯 then Tag closer</button>`:'');
}

async function sendReply(){

// Jake learns from every reply Coach Ben sends + how he edits Jake's drafts. Fire-and-forget.
async function learnFromSend(contactId,sent,suggestion,mode){

/* ---------------- PIPELINE ---------------- */
function pipelineColumns(){
  if(LIVE) return STAGES.map((s,i)=>({key:s.id,name:s.name,color:stageColorByIndex(i),stageId:s.id,match:l=>l.stageId===s.id}));
  const order=[['new','New DM','var(--new)'],['convo','In Convo','var(--convo)'],['script','Script','var(--script)'],['closer','Closer','var(--closer)'],['booked','Booked','var(--booked)'],['won','Client','var(--won)']];
  return order.map(g=>({key:g[0],name:g[1],color:g[2],stageId:null,match:l=>l.group===g[0]}));
}
function vPipeline(v){
  const cols=pipelineColumns();const q=gq();
  v.innerHTML=`<div class="board" id="board" style="height:calc(100vh - 150px)"></div>`;
  const board=document.getElementById('board');
  // While dragging a card, auto-scroll the board when the cursor nears an edge, so you can
  // reach far-away columns without dropping. dragX tracks the pointer; a timer does the scroll.
  board.addEventListener('dragover',e=>{ e.preventDefault(); window.__dragX=e.clientX; });
  board.__autoscroll=()=>{ const r=board.getBoundingClientRect(); const x=window.__dragX||0; const edge=90;
    if(x>r.right-edge) board.scrollLeft+=26; else if(x<r.left+edge && x>0) board.scrollLeft-=26; };
  cols.forEach(cdef=>{
    const col=document.createElement('div');col.className='col';col.style.setProperty('--c',cdef.color);
    const inSt=LEADS.filter(l=>cdef.match(l) && (!q||((l.name+' '+l.loc+' '+l.tags.join(' ')).toLowerCase().includes(q))));
    col.innerHTML=`<div class="col-head"><div class="col-title"><span class="cdot"></span><h3>${esc(cdef.name)}</h3><span class="count">${inSt.length}</span></div></div><div class="cards"></div>`;
    const cards=col.querySelector('.cards');
    inSt.sort((a,b)=>b.score-a.score).forEach(l=>cards.appendChild(kcard(l)));
    cards.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('dragover')});
    cards.addEventListener('dragleave',()=>col.classList.remove('dragover'));
    cards.addEventListener('drop',e=>{e.preventDefault();col.classList.remove('dragover');
      const id=e.dataTransfer.getData('id');const l=LEADS.find(x=>x.id===id);if(!l)return;
      moveLeadToColumn(l,cdef);});
    board.appendChild(col);
  });
}
async function moveLeadToColumn(l,cdef){
  const fromName=l.stageName||stLabel(l.group);
  if(cdef.stageId){
    if(l.stageId===cdef.stageId)return;
    l.stageId=cdef.stageId;l.stageName=cdef.name;l.group=stageGroup(cdef.name);l.booked=l.group==='booked'||l.group==='won';
  }else{ if(l.group===cdef.key)return; l.group=cdef.key; }
  const bd=document.getElementById('board'); const left=bd?bd.scrollLeft:0;
  render();
  const b2=document.getElementById('board'); if(b2)b2.scrollLeft=left;   // keep the board where it was, don't jump to the start
  lastSig=leadsSig();   // we already reflected this change, so the next poll won't re-render over it
  if(LIVE && l.opportunityId && cdef.stageId){
    try{const res=await post({action:'stage',opportunityId:l.opportunityId,stageId:cdef.stageId});
      if(res&&res.ok!==false) toast(`${l.name}: ${fromName} → ${cdef.name}`); else toastErr(`Move failed · ${l.name}`);}
    catch(e){toastErr(`Move failed · ${l.name}`);}
  } else if(LIVE && !l.opportunityId){ toastErr(`${l.name} has no opportunity to move`); }
  else { toast(`${l.name}: ${fromName} → ${cdef.name} (demo)`); }
}
function kcard(l){
  const c=document.createElement('div');c.className='kcard';c.draggable=true;
  c.innerHTML=`<div class="top"><div class="ava" style="width:34px;height:34px;font-size:12px;background:${avaColor(l.name)}">${initials(l.name)}<span class="plat ${l.plat}">${l.plat==='ig'?'◈':'f'}</span></div>
     <div style="flex:1;min-width:0"><div class="nm">${esc(l.name)}</div><div class="hd">${esc(l.loc)} · ${esc(l.time)}</div></div>
     ${scpill2(l.score)}</div>
   <div class="snip">${esc(l.lastMessage)||'<span class="muted">No messages</span>'}</div>
   <div class="foot"><span>🕐 ${esc(l.time)}</span>${(l.group==='booked'||l.booked)?`<span style="color:#4ade80">📅 booked</span>`:(l.needs?'<span style="color:#f7c065">needs reply</span>':'')}</div>`;
  c.addEventListener('dragstart',e=>{e.dataTransfer.setData('id',l.id);c.classList.add('dragging');
    clearInterval(window.__dragTimer); window.__dragTimer=setInterval(()=>{const b=document.getElementById('board');if(b&&b.__autoscroll)b.__autoscroll();},16);});
  c.addEventListener('dragend',()=>{c.classList.remove('dragging');clearInterval(window.__dragTimer);});
  c.addEventListener('click',()=>openLeadMenu(l.id));  // open the lead action card
  return c;
}

// ---- Account notes (synced to HighLevel) ----
function renderLeadNotes(l){
  const el=document.getElementById('lmNotes'); if(!el||lmId!==l.id) return;
  const n=l._notes;
  if(n===undefined){ el.innerHTML='<div class="muted" style="font-size:11.5px">Loading notes…</div>'; return; }
  if(!n.length){ el.innerHTML='<div class="muted" style="font-size:11.5px">No notes yet.</div>'; return; }
  el.innerHTML=n.map(x=>`<div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:8px 10px;margin-bottom:6px"><div style="font-size:12px;line-height:1.5;white-space:pre-wrap;color:#dfe6f2">${esc(x.body)}</div>${x.createdAt?`<div class="muted" style="font-size:10px;margin-top:3px">${esc(fmtTime(x.createdAt))}</div>`:''}</div>`).join('');
}
async function fetchNotes(l){
  if(!l) return; l._notes=undefined; renderLeadNotes(l);
  if(!LIVE||!l.contactId){ l._notes=[]; renderLeadNotes(l); return; }
  try{ const r=await authGet('?action=notes&contactId='+encodeURIComponent(l.contactId)); const j=await r.json(); l._notes=(j.notes||[]); }
  catch(e){ l._notes=[]; }
  renderLeadNotes(l);
}
async function addNote(id){
  const l=LEADS.find(x=>x.id===id); const t=document.getElementById('lmNote'); const v=(t&&t.value||'').trim(); if(!l||!v) return;
  if(t)t.value='';
  l._notes=[{body:v,createdAt:new Date().toISOString()},...(l._notes||[])]; renderLeadNotes(l);   // optimistic
  if(LIVE&&l.contactId){ try{const r=await post({action:'note',contactId:l.contactId,body:v}); if(r&&r.ok!==false){ toast('Note added · '+l.name); fetchNotes(l); } else toastErr('Note failed · '+l.name);}catch(e){toastErr('Note failed · '+l.name);} }
}
const LM_QUICKTAGS=['closer','serious','hot','has coach','foundations','not interested'];
async function addLeadTag(id,tag){

function addLeadTagInput(id){ const i=document.getElementById('lmTag'); const v=(i?.value||'').trim(); if(v){ if(i)i.value=''; addLeadTag(id,v); } }
async function removeLeadTagAt(id,idx){

async function jumpStage(id,stageId){
  const l=LEADS.find(x=>x.id===id); const s=STAGES.find(x=>x.id===stageId); if(!l||!s)return;

  l.stageId=s.id; l.stageName=s.name; l.group=stageGroup(s.name); l.booked=l.group==='booked'||l.group==='won';
  closeLeadMenu();
  if(cur==='pipeline'){ const bd=document.getElementById('board'); const left=bd?bd.scrollLeft:0; render(); const b2=document.getElementById('board'); if(b2)b2.scrollLeft=left; lastSig=leadsSig(); }
  if(LIVE&&l.opportunityId){ try{const res=await post({action:'stage',opportunityId:l.opportunityId,stageId:s.id}); if(res&&res.ok!==false)toast(`${l.name}: ${from} → ${s.name}`); else toastErr(`Move failed · ${l.name}`);}catch(e){toastErr(`Move failed · ${l.name}`);} }
  else if(LIVE&&!l.opportunityId){ toastErr(`${l.name} has no opportunity to move`); }
}
async function removeLead(id){
  const l=LEADS.find(x=>x.id===id); if(!l)return;
  const name=l.name, oppId=l.opportunityId;
  closeLeadMenu();
  LEADS=LEADS.filter(x=>x.id!==id);            // optimistic remove
  if(cur!=='inbox')render();
  if(LIVE&&oppId){ try{const res=await post({action:'delete',opportunityId:oppId}); if(res&&res.ok!==false)toast(`Removed from pipeline · ${name}`); else toastErr(`Remove failed · ${name}`);}catch(e){toastErr(`Remove failed · ${name}`);} }

async function loadPlaybook(){ try{const r=await authGet('?action=getconfig');const j=await r.json();
  const t=document.getElementById('jakePb');if(t)t.value=j.playbook||'';
  const v=document.getElementById('jakeVoice');if(v)v.textContent=j.voice||'Jake hasn’t learned your voice yet — send a few replies and a profile will build automatically.';
  const c=document.getElementById('voiceCount');if(c)c.textContent=(j.learned||0)+' messages learned';
}catch(e){} }
async function refreshVoice(){ const s=document.getElementById('voiceStatus'); if(s)s.textContent='Learning from your messages…';
  try{ const r=await post({action:'distillvoice'});
    if(r&&r.ok){ if(s)s.textContent='Updated ✓'; loadPlaybook(); }
    else if(s)s.textContent=(r&&r.n!=null&&r.n<5)?('Send a few more replies first ('+r.n+'/5)'):'Could not update';
  }catch(e){ if(s)s.textContent='Could not update'; }
  setTimeout(()=>{const s2=document.getElementById('voiceStatus');if(s2&&s2.textContent.indexOf('Learning')<0)s2.textContent='';},3500);
}
async function savePlaybook(){ const t=document.getElementById('jakePb'),s=document.getElementById('pbStatus'); if(!t)return; s.textContent='Saving…'; try{const r=await post({action:'setconfig',playbook:t.value}); s.textContent=(r&&r.ok!==false)?'Saved ✓ — new suggestions use this now':'Save failed'; setTimeout(()=>{if(s)s.textContent='';},3000);}catch(e){s.textContent='Save failed';} }

/* ---------------- JAKE (AI assistant) ---------------- */
let jakeMsgs=[], jakeBusy=false;
const JAKE_PROMPTS=['Who needs a reply today?','Show my hottest leads','Summarize the pipeline','Who booked a call recently?'];
function vJake(v){
  v.style.padding='0';
  v.innerHTML=`<div style="display:flex;flex-direction:column;height:calc(100vh - 60px);max-width:880px;margin:0 auto;width:100%">
    <div class="msgs" id="jmsgs" style="padding:22px 18px"></div>
    <div class="composer" style="padding:10px 18px 16px">
      <div class="sugg" id="jsugg"></div>
      <div class="cbox"><textarea id="jinput" rows="1" placeholder="Ask Jake to find leads, move stages, draft replies…" oninput="grow(this)"></textarea><button class="send" onclick="sendJake()">➤</button></div>
    </div>
  </div>`;
  document.getElementById('jsugg').innerHTML=JAKE_PROMPTS.map(s=>`<div class="schip" data-s="${esc(s).replace(/"/g,'&quot;')}" onclick="jakeSay(this.getAttribute('data-s'))">✨ ${esc(s)}</div>`).join('');
  renderJake();
  setTimeout(()=>document.getElementById('jinput')?.focus(),0);
}
function actLabel(a){ if(a.kind==='move')return `${a.lead} → ${a.to}`; if(a.kind==='tag')return `${a.lead} +${a.tag}`; if(a.kind==='send')return `DM sent · ${a.lead}`; return a.kind; }
function renderJake(){
  const m=document.getElementById('jmsgs'); if(!m) return;
  if(!jakeMsgs.length){
    m.innerHTML=`<div style="text-align:center;margin:auto;max-width:440px">
      <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;font-size:26px;margin:0 auto 14px">🤖</div>
      <div style="font-weight:800;font-size:17px">Jake — your DM assistant</div>
      <div class="muted" style="font-size:12.5px;margin-top:7px;line-height:1.55">Ask about your pipeline, or tell me to move a lead, tag someone, or draft a reply. I work off your live HighLevel data and make the changes for you. I'll always show you a DM draft and confirm before sending.</div>
    </div>`;
    return;
  }
  m.innerHTML=jakeMsgs.map(msg=>{
    const who=msg.role==='user'?'us':'them';
    const label=msg.role==='user'?'Coach Ben':'Jake<span class="ai-tag">AI</span>';
    const body=esc(msg.content).replace(/\n/g,'<br>');
    const acts=(msg.actions&&msg.actions.length)?`<div style="margin-top:9px;display:flex;flex-wrap:wrap;gap:6px">${msg.actions.map(a=>`<span class="ctag" style="color:#9be8c0;border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.12)">✓ ${esc(actLabel(a))}</span>`).join('')}</div>`:'';
    return `<div class="m ${who}"><div class="who">${label}</div><div class="bub">${body}${acts}</div></div>`;
  }).join('')+(jakeBusy?`<div class="m them"><div class="who">Jake<span class="ai-tag">AI</span></div><div class="bub"><span class="muted">thinking…</span></div></div>`:'');
  m.scrollTop=m.scrollHeight;
}
function jakeSay(s){ const i=document.getElementById('jinput'); if(i){i.value=s;grow(i);} sendJake(); }
async function sendJake(){
  const i=document.getElementById('jinput'); const val=(i?.value||'').trim(); if(!val||jakeBusy)return;
  jakeMsgs.push({role:'user',content:val}); if(i){i.value='';grow(i);} jakeBusy=true; renderJake();
  try{
    const res=await post({action:'chat',messages:jakeMsgs.filter(m=>m.role==='user'||m.role==='assistant').map(m=>({role:m.role,content:m.content}))});
    jakeBusy=false;
    jakeMsgs.push({role:'assistant',content:res.reply||'(no reply)',actions:res.actions||[]});
    renderJake();
    if(res.actions&&res.actions.length) refreshSoon();
  }catch(e){ jakeBusy=false; jakeMsgs.push({role:'assistant',content:'Network error reaching Jake — try again.'}); renderJake(); }
}

/* ---------------- background refresh (quiet) ---------------- */
let rtTimer=null, rtOn=false, lastSig='';
// Cheap signature of what's actually visible — so a background refresh only redraws
// when something really changed (stage, score, new message, unread), never on a no-op.
function leadsSig(){ let s=LEADS.length+'|'; for(const l of LEADS) s+=l.id+(l.stageId||'')+l.score+l.lastMs+(l.unread?'1':'0')+(l.needs?'1':'0')+';'; return s; }
// Apply fresh data WITHOUT knocking the user off: skip redraw if nothing changed,
// and preserve scroll position (vertical + the pipeline's horizontal scroll) when it does.
function applyRefresh(){
  renderNav();
  const sig=leadsSig();
  if(sig===lastSig) return;                 // no change → leave the view exactly as-is
  lastSig=sig;
  if(cur==='jake'||cur==='settings'||cur==='automations') return; // never auto-redraw these
  if(cur==='inbox'){ renderIList(); return; }                     // keeps the open thread
  const v=document.getElementById('view'); const top=v?v.scrollTop:0;
  const bd=document.getElementById('board'); const left=bd?bd.scrollLeft:0;
  render();
  const v2=document.getElementById('view'); if(v2)v2.scrollTop=top;
  const b2=document.getElementById('board'); if(b2)b2.scrollLeft=left;
}
function refreshSoon(){clearTimeout(rtTimer);rtTimer=setTimeout(async()=>{await loadLeads();if(authFailed){logout();return;}applyRefresh();},700);}
async function startRealtime(){
  if(!LIVE)return;
  try{
    const {createClient}=await import('https://esm.sh/@supabase/supabase-js@2');
    const sb=createClient(CONFIG.supabaseUrl,CONFIG.anonKey);
    sb.channel('crm-signal')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'crm_signal'},()=>{window.__rtPings=(window.__rtPings||0)+1;refreshSoon();})
      .subscribe((status)=>{ window.__rtStatus=status; rtOn=(status==='SUBSCRIBED'); renderLiveChip(); });
  }catch(e){ window.__rtStatus='error'; }
}

/* ---------------- shared ---------------- */
function openLead(id){go('inbox');setTimeout(()=>openConvo(id),0)}
function gq(){return (document.getElementById('gsearch').value||'').toLowerCase()}
function toast(msg){const t=document.createElement('div');t.className='toast';
  t.innerHTML=`<span class="tdot">✓</span><span>${esc(msg)} &nbsp;·&nbsp; <span style="color:#7fe0a5">${LIVE?'synced to HighLevel':'demo'}</span></span>`;
  document.getElementById('toasts').appendChild(t);setTimeout(()=>t.remove(),2900)}
function toastErr(msg){const t=document.createElement('div');t.className='toast err';
  t.innerHTML=`<span class="tdot" style="background:#f87171">!</span><span>${esc(msg)}</span>`;
  document.getElementById('toasts').appendChild(t);setTimeout(()=>t.remove(),3400)}
document.getElementById('gsearch').addEventListener('input',()=>{if(['inbox','pipeline','leads'].includes(cur))render()});
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey&&document.activeElement?.id==='reply'){e.preventDefault();sendReply()}});

/* ---------------- login gate ---------------- */
function showLogin(msg){
  const o=document.createElement('div');o.id='loginScreen';
  o.style.cssText='position:fixed;inset:0;z-index:200;display:grid;place-items:center;background:radial-gradient(900px 500px at 30% 0%,rgba(79,141,253,.12),transparent 60%),var(--bg)';
  o.innerHTML=`<div style="width:340px;max-width:90vw;text-align:center">
    <div class="logo" style="width:54px;height:54px;border-radius:15px;font-size:22px;margin:0 auto 16px">BB</div>
    <h1 style="font-size:20px;font-weight:800">Big Benchas CRM</h1>
    <div class="muted" style="font-size:12.5px;margin:6px 0 20px">Enter your team passcode to continue</div>
    ${msg?`<div style="color:#f87171;font-size:12px;margin-bottom:10px">${esc(msg)}</div>`:''}
    <input id="pwd" class="inp" type="password" placeholder="Passcode" style="text-align:center;padding:12px" autofocus>
    <button class="btn primary" style="width:100%;justify-content:center;margin-top:12px;padding:12px" onclick="doLogin()">Unlock CRM</button>
  </div>`;
  document.body.appendChild(o);
  const inp=o.querySelector('#pwd');inp.focus();
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
}
async function doLogin(){
  const inp=document.getElementById('pwd');const val=(inp.value||'').trim();if(!val)return;
  APP_KEY=val; authFailed=false;
  const r=await authGet('?action=list').catch(()=>({status:0}));
  if(r.status===401){ APP_KEY=''; const s=document.getElementById('loginScreen'); if(s)s.remove(); showLogin('Wrong passcode — try again'); return; }
  localStorage.setItem('bb_crm_key',APP_KEY);
  const s=document.getElementById('loginScreen'); if(s)s.remove();
  boot();
}
function logout(){ localStorage.removeItem('bb_crm_key'); APP_KEY=''; location.reload(); }

/* ---------------- boot ---------------- */
async function boot(){
  if(!APP_KEY){ showLogin(); return; }
  renderNav();
  document.getElementById('view').innerHTML=`<div class="muted" style="padding:40px;text-align:center">Loading live data from HighLevel…</div>`;
  await Promise.all([loadLeads(), refreshStages()]);
  if(authFailed){ logout(); return; }
  renderNav();render();lastSig=leadsSig();startRealtime();
  clearInterval(window.__pollTimer);   // never stack timers across re-logins
  window.__pollTimer=setInterval(async()=>{await loadLeads();if(authFailed){logout();return;}applyRefresh();},CONFIG.refreshMs);
}
boot();
